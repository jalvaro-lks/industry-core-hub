  submodel_dispatcher:
    # Mode selection: "filesystem" (local storage) or "http" (external service)
    mode: "http"
    # Local filesystem configuration (used when mode=filesystem)
    path: "./data/submodels"
    apiPath: /submodel-dispatcher
    # External HTTP service configuration (used when mode=http)
    http:
      # Base URL of the external ICHub-compatible submodel service
      base_url: "https://backend-ichub-manufacturer.int.catena-x.net"
      # Optional API path prefix (e.g., "/api/v1" or empty string)
      api_path: "/v1/submodel-dispatcher"
      # Authentication configuration
      auth:
        enabled: true
        # Authentication type: "bearer" (Bearer token) or "apikey" (API Key)
        type: "apikey"
        # Authentication token/key - can use environment variable: ${SUBMODEL_SERVICE_TOKEN}
        token: "\u003cpath:industry-core-hub/data/backend#apiKey\u003e"
        # Header name for API key (required when type="apikey", e.g., "X-Api-Key")
        key_name: "X-Api-Key"
      # Request timeout in seconds
      timeout: 30
      # SSL certificate verification (set to false only for development)
      verify_ssl: false
