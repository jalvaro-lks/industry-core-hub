database:
  connection_string: "postgresql://user:password@localhost:5432/manufacturerichub"
  echo: false

cors:
  enabled: true
  allow_origins:
    - "http://localhost:5174"     # Vite dev server
    - "http://localhost:3000"     # React dev server
    - "http://localhost:8080"     # Alternative frontend port
    - "http://127.0.0.1:5174"     # Alternative localhost notation
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:8080"
    - "http://localhost:4173"
  allow_credentials: true
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_headers:
    - "*"

