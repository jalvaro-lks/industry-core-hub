info:
  name: Add SubPart to Our Main Part
  type: http
  seq: 2

http:
  method: POST
  url: "{{MainICHUB-URL}}/v1/addons/pcf-kit/consumption/parts/{{MainManufacturerPartId}}/subparts"
  body:
    type: json
    data: |-
      {
        "manufacturerPartId": "{{SubPartManufacturerPartId2}}",
        "bpn": "{{SubBPN}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

