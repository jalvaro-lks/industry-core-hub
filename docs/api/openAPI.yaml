  /v1/addons/ecopass-kit/passports:
    get:
      tags:
        - Add-Ons Microservices
        - EcoPass KIT Microservices
      summary: Get All Passports
      description: >-
        Retrieve all Digital Product Passports (DPPs) from the system.


        This endpoint fetches all twins that have DPP aspects
        (digital_product_passport semantic ID)

        and returns them in the standardized DPP format.


        Returns:
            List[DigitalProductPassport]: A list of all Digital Product Passports in the system

        Raises:
            HTTPException: If there's an error retrieving the passports
      operationId: get_all_passports_v1_addons_ecopass_kit_passports_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DigitalProductPassport'
                type: array
                title: Response Get All Passports V1 Addons Ecopass Kit Passports Get
      security:
        - APIKeyHeader: []
        - HTTPBearer: []
  /v1/addons/ecopass-kit/provision/share:
    post:
      tags:
        - Add-Ons Microservices
        - EcoPass KIT Microservices
      summary: Share Dpp
      description: >-
        Share a Digital Product Passport (catalog or serialized part twin) with
        a single business partner.


        This endpoint:

        1. Validates the DPP exists and is associated with a catalog or
        serialized part twin

        2. Shares the twin using the appropriate sharing logic

        3. Registers the manufacturer part ID in BPN Discovery


        Args:
            request: ShareDppRequest containing DPP ID and target BPNL

        Returns:
            ShareDppResponse with sharing status

        Raises:
            HTTPException: If the DPP is not found or sharing fails
      operationId: share_dpp_v1_addons_ecopass_kit_provision_share_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareDppRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareDppResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: []
        - HTTPBearer: []
  /v1/addons/ecopass-kit/discover/:
    post:
      tags:
        - Add-Ons Microservices
        - EcoPass KIT Microservices
      summary: Discover Dpp
      description: >-
        Discover a Digital Product Passport using BPN Discovery and DTR lookup.


        This endpoint:

        1. Parses the ID to extract manufacturerPartId and partInstanceId

        2. Uses BPN Discovery to find the BPN owner of the manufacturerPartId

        3. Uses DTR Consumer to retrieve the digital twin shell

        4. Looks up the submodel matching the provided semanticId

        5. Consumes the submodel data


        The operation runs asynchronously with step-by-step status tracking.

        Use the returned taskId to check progress via GET
        /discover/{taskId}/status


        Args:
            request: DiscoverDppRequest with id and semanticId
            background_tasks: FastAPI background tasks
            
        Returns:
            DiscoverDppResponse with taskId and initial status
            
        Raises:
            HTTPException: If the ID format is invalid
      operationId: discover_dpp_v1_addons_ecopass_kit_discover__post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverDppRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverDppResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: []
        - HTTPBearer: []
  '/v1/addons/ecopass-kit/discover/{task_id}/status':
    get:
      tags:
        - Add-Ons Microservices
        - EcoPass KIT Microservices
      summary: Get Discovery Status
      description: |-
        Get the current status of a discovery task.

        Args:
            task_id: The unique task identifier from the initial discovery request
            
        Returns:
            DiscoverDppResponse with current status and results (if completed)
            
        Raises:
            HTTPException: If the task ID is not found
      operationId: get_discovery_status_v1_addons_ecopass_kit_discover__task_id__status_get
      security:
        - APIKeyHeader: []
        - HTTPBearer: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            title: Task Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverDppResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
