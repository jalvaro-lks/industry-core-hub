    Notification:
      properties:
        header:
          $ref: '#/components/schemas/NotificationHeader'
          description: Notification header with metadata based on message_header_3.0.0
        content:
          $ref: '#/components/schemas/NotificationContent'
          description: Notification content/body
      type: object
      required:
        - header
      title: Notification
      description: >-
        Complete notification model following Industry Core Notifications
        schema.


        Combines header (based on io.catenax.shared.message_header_3.0.0) and

        content into a single notification entity that can be sent through

        the Catena-X dataspace.


        Schema:
        https://catenax-ev.github.io/assets/files/notification.schema.json


        Attributes:
            header: Notification header with metadata (required)
            content: Notification content/body (required)
    NotificationContent:
      properties:
        information:
          anyOf:
            - type: string
            - type: 'null'
          title: Information
          description: Human-readable notification message or description
        listOfAffectedItems:
          items:
            type: string
          type: array
          title: Listofaffecteditems
          description: List of affected part or serial numbers
      additionalProperties: true
      type: object
      title: NotificationContent
      description: |-
        Notification content/body for Industry Core notifications.

        The content structure is flexible and can contain any payload.
        Common fields for quality notifications are provided as optional fields.

        Attributes:
            information: Human-readable description or message
            list_of_affected_items: List of affected part/serial numbers
    NotificationHeader:
      properties:
        messageId:
          type: string
          format: uuid
          title: Messageid
          description: >-
            Unique ID identifying the message. The purpose of the ID is to
            uniquely identify a single message, therefore it MUST not be reused.
        context:
          type: string
          title: Context
          description: >-
            Information about the context the message should be considered in.
            Format: <domain>-<subdomain>-<object>:<version> (e.g.,
            IndustryCore-DigitalTwinEventAPI-ConnectToParent:3.0.0)
          examples:
            - 'IndustryCore-DigitalTwinEventAPI-ConnectToParent:3.0.0'
        sentDateTime:
          type: string
          format: date-time
          title: Sentdatetime
          description: >-
            Time zone aware timestamp holding the date and time the message was
            sent. Formatted according to ISO 8601.
        senderBpn:
          type: string
          pattern: '^BPNL[a-zA-Z0-9]{12}$'
          title: Senderbpn
          description: >-
            The Business Partner Number of the sending party. Must be a valid
            BPNL.
        receiverBpn:
          type: string
          pattern: '^BPNL[a-zA-Z0-9]{12}$'
          title: Receiverbpn
          description: >-
            The Business Partner Number of the receiving party. Must be a valid
            BPNL.
        version:
          type: string
          pattern: >-
            ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9A-Za-z-][0-9A-Za-z-]*)(\.[0-9A-Za-z-]+)*)?([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$
          title: Version
          description: >-
            The version of the message header aspect model following semantic
            versioning.
          default: 3.0.0
        expectedResponseBy:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          title: Expectedresponseby
          description: >-
            Timestamp by which the sending party expects a response. Formatted
            according to ISO 8601.
        relatedMessageId:
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          title: Relatedmessageid
          description: Unique ID identifying a message somehow related to the current one.
      type: object
      required:
        - context
        - senderBpn
        - receiverBpn
      title: NotificationHeader
      description: |-
        Notification header based on io.catenax.shared.message_header_3.0.0.

        This header follows the Industry Core Notifications schema structure
        as defined in the Catena-X standards.

        Attributes:
            message_id: Unique ID identifying the message (required)
            context: Information about the context (e.g., "IndustryCore-DigitalTwinEventAPI-ConnectToParent:2.0.0")
            sent_date_time: Timestamp when the message was sent (required)
            sender_bpn: Business Partner Number of the sender (required)
            receiver_bpn: Business Partner Number of the receiver (required)
            expected_response_by: Optional deadline for response
            related_message_id: Optional reference to a related message
            version: Header version following semantic versioning (required)
    NotificationResponse:
      properties:
        id:
          type: integer
          title: Id
        created_at:
          type: string
          format: date-time
          title: Created At
        message_id:
          type: string
          format: uuid
          title: Message Id
        sender_bpn:
          type: string
          title: Sender Bpn
        receiver_bpn:
          type: string
          title: Receiver Bpn
        direction:
          type: string
          title: Direction
        status:
          type: string
          title: Status
        use_case:
          anyOf:
            - type: string
            - type: 'null'
          title: Use Case
        full_notification:
          additionalProperties: true
          type: object
          title: Full Notification
      type: object
      required:
        - id
        - created_at
        - message_id
        - sender_bpn
        - receiver_bpn
        - direction
        - status
        - full_notification
      title: NotificationResponse
      description: >-
        API response model for notifications.


        This model ensures proper serialization of notification data when
        returned

        from API endpoints. It maps from the database entity to a clean,
        serializable

        format for the API consumer.
      example:
        created_at: '2026-02-27T15:04:07.319919Z'
        direction: INCOMING
        full_notification:
          content:
            additionalProp1: {}
            information: Hello
            list_of_affected_items:
              - DTR_Update
          header:
            context: 'IndustryCore-DigitalTwinEventAPI-ConnectToParent:3.0.0'
            message_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
            receiver_bpn: BPNL000000000342
            sender_bpn: BPNL00000000024R
            sent_date_time: '2026-02-27T11:26:21.146000Z'
            version: 3.0.0
        id: 1
        message_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        receiver_bpn: BPNL000000000342
        sender_bpn: BPNL00000000024R
        status: RECEIVED
        use_case: Industry Core Hub
    NotificationStatus:
      type: string
      enum:
        - received
        - read
        - pending
        - sent
        - failed
      title: NotificationStatus
